<svg viewBox="0 0 400 320" xmlns="http://www.w3.org/2000/svg" fill="none">
  <!-- Background -->
  <circle cx="200" cy="160" r="140" fill="#16A34A" fill-opacity="0.04"/>

  <!-- Curved path line -->
  <path d="M 60 260 C 80 260 90 200 120 200 C 150 200 150 160 180 160 C 210 160 210 120 240 120 C 270 120 270 100 300 100 C 330 100 340 80 360 80"
        stroke="#16A34A" stroke-width="2.5" stroke-dasharray="8,5" stroke-opacity="0.35" stroke-linecap="round"/>

  <!-- Step 1: Pledge (done) -->
  <g transform="translate(42,230)">
    <circle cx="20" cy="20" r="20" fill="#16A34A" fill-opacity="0.2" stroke="#16A34A" stroke-width="2"/>
    <!-- checkmark -->
    <path d="M10 20 L16 26 L30 12" stroke="#16A34A" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="88" y="246" font-family="sans-serif" font-size="11" fill="#16A34A" font-weight="700">Pledged</text>
  <text x="88" y="260" font-family="sans-serif" font-size="9" fill="#16A34A" fill-opacity="0.6">2 days ago</text>
  <!-- volunteer icon -->
  <path d="M58 232 C58 228 54 224 50 226 C46 228 46 232 50 236 L58 242 L66 236 C70 232 70 228 66 226 C62 224 58 228 58 232Z" fill="#16A34A" fill-opacity="0.7" transform="translate(-4,-4) scale(0.6)"/>

  <!-- Step 2: Matched (done) -->
  <g transform="translate(100,148)">
    <circle cx="20" cy="20" r="20" fill="#16A34A" fill-opacity="0.2" stroke="#16A34A" stroke-width="2"/>
    <path d="M10 20 L16 26 L30 12" stroke="#16A34A" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="146" y="164" font-family="sans-serif" font-size="11" fill="#16A34A" font-weight="700">Matched</text>
  <text x="146" y="178" font-family="sans-serif" font-size="9" fill="#16A34A" fill-opacity="0.6">NGO confirmed</text>

  <!-- Step 3: In Transit (current) -->
  <g transform="translate(160,108)">
    <circle cx="20" cy="20" r="20" fill="#D97706" fill-opacity="0.2" stroke="#D97706" stroke-width="2"/>
    <!-- truck icon -->
    <rect x="6" y="14" width="22" height="14" rx="2" fill="#D97706" fill-opacity="0.5"/>
    <rect x="28" y="18" width="8" height="10" rx="1" fill="#D97706" fill-opacity="0.5"/>
    <circle cx="11" cy="29" r="3" fill="#D97706"/>
    <circle cx="31" cy="29" r="3" fill="#D97706"/>
    <!-- pulse ring for "active" -->
    <circle cx="20" cy="20" r="26" stroke="#D97706" stroke-width="1" stroke-opacity="0.4" stroke-dasharray="4,3"/>
  </g>
  <text x="206" y="124" font-family="sans-serif" font-size="11" fill="#D97706" font-weight="700">In Transit</text>
  <text x="206" y="138" font-family="sans-serif" font-size="9" fill="#D97706" fill-opacity="0.7">On the way</text>

  <!-- Step 4: Delivered (pending) -->
  <g transform="translate(220,68)">
    <circle cx="20" cy="20" r="20" fill="#1A3A4A" stroke="#2A4A5A" stroke-width="1.5"/>
    <!-- box icon -->
    <rect x="9" y="13" width="22" height="16" rx="2" fill="#2A5A6A" fill-opacity="0.6"/>
    <path d="M9 19 L31 19" stroke="#3A7A8A" stroke-width="1"/>
    <path d="M20 13 L20 19" stroke="#3A7A8A" stroke-width="1"/>
  </g>
  <text x="266" y="84" font-family="sans-serif" font-size="11" fill="#3A6A7A" font-weight="600">Delivered</text>
  <text x="266" y="98" font-family="sans-serif" font-size="9" fill="#3A5A6A">Expected tomorrow</text>

  <!-- Step 5: Confirmed (pending) -->
  <g transform="translate(280,48)">
    <circle cx="20" cy="20" r="20" fill="#1A3A4A" stroke="#2A4A5A" stroke-width="1.5"/>
    <!-- star icon -->
    <path d="M20 10 L22 16 L28 16 L23 20 L25 26 L20 22 L15 26 L17 20 L12 16 L18 16 Z" fill="#2A5A6A"/>
  </g>
  <text x="326" y="64" font-family="sans-serif" font-size="11" fill="#3A6A7A" font-weight="600">Confirmed</text>
  <text x="326" y="78" font-family="sans-serif" font-size="9" fill="#3A5A6A">Impact verified</text>

  <!-- Progress indicator bar at bottom -->
  <rect x="60" y="294" width="280" height="6" rx="3" fill="#1A3A4A"/>
  <rect x="60" y="294" width="168" height="6" rx="3" fill="#16A34A" fill-opacity="0.7"/>
  <circle cx="228" cy="297" r="5" fill="#D97706" stroke="#071D2C" stroke-width="1.5"/>
  <text x="60" y="312" font-family="sans-serif" font-size="9" fill="#4A8A9A">60% complete</text>
  <text x="316" y="312" font-family="sans-serif" font-size="9" fill="#4A8A9A" text-anchor="end">Pledge #NL-2847</text>
</svg>
