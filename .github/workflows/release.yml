name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-distribute:
    name: Build & Distribute
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: needlink_mobile
        run: flutter pub get

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode \
            > needlink_mobile/android/app/needlink-release.jks

      - name: Build signed release APK
        working-directory: needlink_mobile
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/needlink_mobile/android/app/needlink-release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: flutter build apk --release

      - name: Upload to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: 1:290021143671:android:fd1d1e9037f2d6f5464272
          token: ${{ secrets.FIREBASE_TOKEN }}
          groups: testers
          file: needlink_mobile/build/app/outputs/flutter-apk/app-release.apk
          releaseNotes: "NeedLink ${{ github.ref_name }}"

      - name: Save APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: needlink-${{ github.ref_name }}.apk
          path: needlink_mobile/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
